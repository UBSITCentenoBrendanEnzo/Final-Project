<div class="premium-item-card" [ngClass]="'theme-' + product.type.toLowerCase().replace(' ', '-')">
  <div class="card-category-badge">{{ product.type }}</div>
  
  <div class="card-visual-wrapper">
    <div class="glow-orb"></div>
    <span class="emoji-asset">{{ product.image }}</span>
  </div>
  
  <h3 class="card-item-title">{{ product.name }}</h3>
  
  <div class="card-price-row">
    <span class="currency-token">₱</span>
    <span class="price-value">{{ product.price }}</span>
  </div>
  
  <button class="action-add-btn" (click)="add.emit(product)">
    <span class="btn-text">Add To Cart</span>
    <span class="btn-icon-arrow">→</span>
  </button>
</div>
