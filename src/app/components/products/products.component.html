<div class="storefront-hero">
  <h1>Pokémon Item Mart</h1>
  <p class="subtitle">Equip your trainer bag with verified, high-performance battle supplies</p>
</div>

<div class="row justify-content-center mb-5">
  <div class="col-md-8 col-lg-6">
    <div class="search-glass-container">
      <span class="search-pulse-icon">🔍</span>
      <input 
        type="text" 
        [(ngModel)]="searchQuery" 
        (input)="onSearchChange()" 
        class="search-field-input" 
        placeholder="Search supply inventory name (e.g., heavy-ball, zinc, potion)...">
    </div>
  </div>
</div>

<div class="products">
  @for(item of filteredItems; track item.id){
    <app-product-card
      [product]="item"
      (add)="addProduct($event)">
    </app-product-card>
  }
</div>

@if(filteredItems.length === 0 && searchQuery.trim().length > 2){
  <div class="search-loading-state text-center py-5">
    <div class="spinner-growth-indicator" role="status"></div>
    <p class="loading-label mt-3">Scanning inventory system indexes data streams...</p>
  </div>
}
